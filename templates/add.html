<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
    <div class="container">
        <div class="card">
            <h1>✍️ Add Expense</h1>
            <form action="/add" method="POST">
                <div class="input-group">
                    <label>What did you buy?</label>
                    <input type="text" name="title" required>
                </div>
                <div class="input-group">
                    <label>Amount (₹)</label>
                    <input type="number" name="amount" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select name="category">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Rent">Rent</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" name="date" required>
                </div>
                <button type="submit" class="btn">Save Transaction</button>
            </form>
            <br><a href="/" style="text-decoration:none; color:var(--mid);">Cancel</a>
        </div>
    </div>
</body>
</html>
