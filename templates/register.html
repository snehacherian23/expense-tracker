<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body { background-color: #dee6ed; font-family: sans-serif; display: flex; justify-content: center; padding-top: 100px; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 300px; text-align: center;}
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #8b3a3a; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Register</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Choose Password" required>
            <button type="submit">Create Account</button>
        </form>
        <p><a href="/login">Back to Login</a></p>
    </div>
</body>
</html>
