<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
    <div class="container" style="max-width:500px;">
        <div class="card">
            <h1>🗓️ SET MONTHLY BUDGET</h1>
            <form method="POST">
                <div class="form-group">
                    <label>Month</label>
                    <select name="month">
                        <option value="January">January</option><option value="February">February</option>
                        <option value="March">March</option><option value="April">April</option>
                        <option value="May">May</option><option value="June">June</option>
                        <option value="July">July</option><option value="August">August</option>
                        <option value="September">September</option><option value="October">October</option>
                        <option value="November">November</option><option value="December">December</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Rent">Rent</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Budget Amount (₹)</label>
                    <input type="number" name="amount" placeholder="e.g. 10000" required>
                </div>
                <button type="submit" class="btn">SAVE BUDGET</button>
            </form>
            <br><a href="/" style="text-decoration:none; color:var(--slate-grey); font-weight: bold;">← BACK TO DASHBOARD</a>
        </div>
    </div>
</body>
</html>
